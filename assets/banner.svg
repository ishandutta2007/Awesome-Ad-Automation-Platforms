<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50" />
      <stop offset="100%" stop-color="#3498db" />
    </linearGradient>
    <style>
      .title { font: bold 48px 'Segoe UI', sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .subtitle { font: 20px 'Segoe UI', sans-serif; fill: #ecf0f1; text-anchor: middle; dominant-baseline: middle; }
      .circle1 { animation: float 6s ease-in-out infinite; }
      .circle2 { animation: float 8s ease-in-out infinite reverse; }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
      }
      .pulse { animation: pulse 3s infinite; }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.1; }
        50% { transform: scale(1.1); opacity: 0.2; }
        100% { transform: scale(1); opacity: 0.1; }
      }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" rx="15" />
  
  <g class="circle1">
    <circle cx="100" cy="150" r="40" fill="#ffffff" class="pulse" />
    <circle cx="150" cy="50" r="20" fill="#ffffff" opacity="0.15" />
  </g>
  
  <g class="circle2">
    <circle cx="700" cy="60" r="50" fill="#ffffff" class="pulse" />
    <circle cx="650" cy="160" r="25" fill="#ffffff" opacity="0.15" />
  </g>
  
  <text x="400" y="85" class="title">Ad Automation Platforms</text>
  <text x="400" y="145" class="subtitle">An awesome list of resources &amp; tools</text>
</svg>
